# ~~ Generated by projen. To modify, edit .projenrc.ts and run "npx projen".

version: 2
updates:
  - package-ecosystem: npm
    versioning-strategy: lockfile-only
    directory: /
    schedule:
      interval: weekly
    ignore:
      - dependency-name: projen
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    labels:
      - dependencies
    groups:
      aws-sdk:
        patterns:
          - "@aws-sdk/*"
          - "@smithy/*"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/*"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-minor-days: 7
      semver-patch-days: 3
      include:
        - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - github-actions
